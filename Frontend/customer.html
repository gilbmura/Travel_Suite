<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel suite — Ticket Booking</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      margin: 0;
      background: url('13.jpg') no-repeat center center/cover;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: rgba(0,0,0,0.75);
      padding: 1rem 2rem;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      color: #ffce00;
      letter-spacing: 1px;
    }

    main {
      background: rgba(0,0,0,0.65);
      margin: 2rem auto;
      padding: 2rem;
      width: 90%;
      max-width: 900px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    h1, h2 {
      text-align: center;
      color: #ffce00;
    }

    label {
      display: block;
      margin-top: 1rem;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      padding: 0.8rem;
      margin-top: 0.5rem;
      border: none;
      border-radius: 5px;
      outline: none;
      background: rgba(255,255,255,0.9);
      color: #000;
    }

    .btn {
      display: inline-block;
      margin-top: 1.2rem;
      padding: 0.8rem 1.5rem;
      background: #ffce00;
      color: #000;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ffdd33;
      transform: scale(1.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1.5rem;
      background: rgba(255,255,255,0.9);
      color: #000;
      border-radius: 6px;
      overflow: hidden;
    }

    th, td {
      padding: 0.8rem;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    th {
      background: #ffce00;
    }

    /* Ticket modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #fff;
      color: #000;
      padding: 2rem;
      border-radius: 10px;
      width: 350px;
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    .modal-content h3 {
      color: #333;
      margin-bottom: 1rem;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: scale(0.8);}
      to {opacity: 1; transform: scale(1);}
    }

    footer {
      text-align: center;
      margin-top: auto;
      padding: 1rem;
      background: rgba(0,0,0,0.75);
      color: #ccc;
    }
  </style>
</head>
<body>

<header>🚌 Travel suite — Online Ticket Booking</header>

<main>
  <section id="book">
    <h1>Find and Book Your Ride</h1>

    <!-- Step 1: Choose Route -->
    <form id="routeForm">
      <label>Origin</label>
      <select id="origin" required>
        <option value="">Select Origin</option>
      </select>

      <label>Destination</label>
      <select id="destination" required>
        <option value="">Select Destination</option>
      </select>

      <label>Travel Date</label>
      <input type="date" id="travelDate" required>

      <button type="button" class="btn" id="searchBtn">Search Available Cars</button>
    </form>

    <!-- Step 2: Show Available Vehicles -->
    <div id="vehicleResults" style="display:none;">
      <h2>Available Cars</h2>
      <div id="vehicleNotice" style="display:none; margin-bottom:12px; padding:12px; background:#fff3cd; color:#856404; border-radius:6px;"></div>
      <table>
        <thead>
          <tr>
            <th>License Plate</th>
            <th>Departure</th>
            <th>Fare</th>
            <th>Seats</th>
            <th>Select</th>
          </tr>
        </thead>
        <tbody id="vehicleTableBody"></tbody>
      </table>
    </div>

    <!-- Step 3: Passenger Info -->
    <form id="travelerForm" style="display:none;">
      <h2>Passenger Information</h2>

      <label>Full Name</label>
      <input type="text" id="travelerName" placeholder="Placide shami" required>

      <label>Phone Number</label>
      <input type="tel" id="travelerPhone" placeholder="+250788345678" required>

      <label>Selected Vehicle</label>
      <input type="text" id="selectedVehicle" readonly>

      <label>Total Fare</label>
      <input type="text" id="fareDisplay" readonly>

      <label>Seats to Book</label>
      <input type="number" id="seatCount" min="1" value="1" required>

      <label>Payment Method</label>
      <select id="paymentMethod">
        <option value="Cash">Cash</option>
        <option value="Card">Card</option>
        <option value="MobileMoney">Mobile Money</option>
      </select>

      <button type="submit" class="btn">Confirm Booking</button>
    </form>
  </section>
</main>

<!-- Ticket Modal -->
<div id="ticketModal" class="modal">
  <div class="modal-content">
    <h3>🎟️ Your Ticket</h3>
    <p id="ticketDetails"></p>
    <canvas id="qrCanvas"></canvas>
    <button class="btn" onclick="closeModal()">Close</button>
  </div>
</div>

<footer>© 2025 SmartBus | Travel Made Easy</footer>

<script src="scripts.js"></script>
<!-- QR Generator -->
<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>

<script>
const searchBtn = document.getElementById('searchBtn');
const vehicleResults = document.getElementById('vehicleResults');
const vehicleTableBody = document.getElementById('vehicleTableBody');
const vehicleNotice = document.getElementById('vehicleNotice');
const travelerForm = document.getElementById('travelerForm');
const selectedVehicleInput = document.getElementById('selectedVehicle');
const fareDisplay = document.getElementById('fareDisplay');
const ticketModal = document.getElementById('ticketModal');
const ticketDetails = document.getElementById('ticketDetails');
const seatCountInput = document.getElementById('seatCount');
const paymentMethodInput = document.getElementById('paymentMethod');

let searchResults = [];
let selectedVehicleId = null;
let selectedOrigin = null;
let selectedDestination = null;
let selectedFare = 0;
let selectedTravelDate = null;

function escapeHtml(value) {
  return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Populate origin and destination dropdowns from database
async function populateRouteFilters() {
  const originSelect = document.getElementById('origin');
  const destinationSelect = document.getElementById('destination');
  
  if (!originSelect || !destinationSelect) {
    console.warn('Origin or destination select elements not found');
    return;
  }
  
  try {
    // Try to use window.getRouteFilters, or fallback to direct fetch
    let filters;
    if (typeof window.getRouteFilters === 'function') {
      filters = await window.getRouteFilters();
    } else {
      // Fallback: direct fetch if function not available
      console.warn('getRouteFilters not available, using direct fetch');
      const API_ROOT = 'http://127.0.0.1:8000/api';
      const res = await fetch(`${API_ROOT}/routes/filters/`, {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' }
      });
      if (!res.ok) throw new Error('Failed to load route filters');
      filters = await res.json();
    }
    
    const origins = filters.origins || [];
    const destinations = filters.destinations || [];
    
    console.log('Loaded route filters:', { origins, destinations });
    
    // Clear existing options except the first "Select" option
    while (originSelect.options.length > 1) {
      originSelect.remove(1);
    }
    while (destinationSelect.options.length > 1) {
      destinationSelect.remove(1);
    }
    
    // Populate origin dropdown
    origins.forEach(origin => {
      const option = document.createElement('option');
      option.value = origin;
      option.textContent = origin;
      originSelect.appendChild(option);
    });
    
    // Populate destination dropdown
    destinations.forEach(destination => {
      const option = document.createElement('option');
      option.value = destination;
      option.textContent = destination;
      destinationSelect.appendChild(option);
    });
  } catch (err) {
    console.error('Failed to load route filters', err);
    // Show user-friendly error message
    const errorMsg = document.createElement('div');
    errorMsg.style.cssText = 'color: #ff6b6b; padding: 10px; text-align: center; background: rgba(255,255,255,0.1); border-radius: 4px; margin: 10px 0;';
    errorMsg.textContent = 'Failed to load routes. Please refresh the page.';
    const form = document.querySelector('.booking-form');
    if (form && !form.querySelector('.error-msg')) {
      errorMsg.className = 'error-msg';
      form.insertBefore(errorMsg, form.firstChild);
    }
  }
}

// Load route filters when page loads
document.addEventListener('DOMContentLoaded', () => {
  // Wait a bit for scripts.js to load
  if (typeof window.getRouteFilters === 'function') {
    populateRouteFilters();
  } else {
    // Retry after a short delay
    setTimeout(populateRouteFilters, 200);
  }
});

searchBtn.addEventListener('click', async () => {
  const origin = document.getElementById('origin').value.trim().toUpperCase();
  const destination = document.getElementById('destination').value.trim().toUpperCase();
  const travelDate = document.getElementById('travelDate').value;

  if (!origin || !destination || !travelDate) {
    alert('Please select origin, destination and date.');
    return;
  }

  try {
    vehicleTableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:16px;">Searching...</td></tr>';
    if (vehicleNotice) {
      vehicleNotice.textContent = '';
      vehicleNotice.style.display = 'none';
    }
    const results = await window.searchVehicles({ origin, destination, date: travelDate });
    searchResults = Array.isArray(results) ? results : [];
    selectedTravelDate = travelDate;
    renderVehicleRows(searchResults);
  } catch (err) {
    console.error('Vehicle search failed', err);
    vehicleTableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:16px; color:#d9534f;">Unable to load vehicles. Please try again.</td></tr>';
  }
});

function renderVehicleRows(results) {
  if (!vehicleTableBody) return;
  if (!Array.isArray(results) || results.length === 0) {
    vehicleTableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:16px;">No vehicles found for the selected route.</td></tr>';
    if (vehicleNotice) {
      vehicleNotice.textContent = 'Sorry, no buses are available for that route on the selected date.';
      vehicleNotice.style.display = 'block';
    }
    travelerForm.style.display = 'none';
    vehicleResults.style.display = 'block';
    return;
  }
  if (vehicleNotice) {
    vehicleNotice.textContent = '';
    vehicleNotice.style.display = 'none';
  }
  vehicleTableBody.innerHTML = '';
  results.forEach(vehicle => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${escapeHtml(vehicle.license_plate)}</td>
      <td>${escapeHtml(vehicle.departure_time || '')}</td>
      <td>${escapeHtml(vehicle.fare || '')}</td>
      <td>${escapeHtml(vehicle.available_seats)}</td>
      <td><button class="btn selectBtn" data-id="${vehicle.vehicle_id}">Select</button></td>
    `;
    vehicleTableBody.appendChild(row);
  });
  vehicleResults.style.display = 'block';
}

document.addEventListener('click', (e) => {
  if (e.target.classList.contains('selectBtn')) {
    const vehicleId = e.target.getAttribute('data-id');
    const vehicle = searchResults.find(v => String(v.vehicle_id) === vehicleId);
    if (!vehicle) return;

    selectedVehicleId = vehicle.vehicle_id;
    selectedOrigin = vehicle.origin;
    selectedDestination = vehicle.destination;
    selectedFare = Number(vehicle.fare || 0);

    selectedVehicleInput.value = `${vehicle.license_plate} — ${vehicle.departure_time || ''}`;
    fareDisplay.value = vehicle.fare ? `Rwf ${vehicle.fare}` : 'N/A';
    travelerForm.style.display = 'block';
    window.scrollTo({ top: travelerForm.offsetTop, behavior: 'smooth' });
  }
});

travelerForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!selectedVehicleId) {
    alert('Please select a vehicle first.');
    return;
  }

  const name = document.getElementById('travelerName').value.trim();
  const phone = document.getElementById('travelerPhone').value.trim();
  const seats = parseInt(seatCountInput.value, 10) || 1;
  const paymentMethod = paymentMethodInput.value || 'Cash';

  try {
    const response = await window.createPublicBooking({
      customer_name: name,
      vehicle_id: selectedVehicleId,
      travel_date: selectedTravelDate,
      seats_booked: seats,
      payment_method: paymentMethod,
      payment_details: phone
    });

    const detailsText = `
      Booking ID: ${response.booking_id}
      Name: ${name}
      Phone: ${phone}
      Route: ${selectedOrigin} → ${selectedDestination}
      Travel Date: ${selectedTravelDate}
      Seats: ${seats}
      Payment Status: ${response.payment_status}
    `;

    ticketDetails.innerHTML = detailsText.replace(/\n/g, '<br>');
    new QRious({
      element: document.getElementById('qrCanvas'),
      value: detailsText,
      size: 180
    });

    ticketModal.style.display = 'flex';
    travelerForm.reset();
    selectedVehicleInput.value = '';
    fareDisplay.value = '';
    seatCountInput.value = 1;
  } catch (err) {
    console.error('Booking failed', err);
    alert(err.message || 'Unable to complete booking.');
  }
});

function closeModal() {
  ticketModal.style.display = 'none';
}
</script>
</body>
</html>
